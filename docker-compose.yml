services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: syncdb
    command: >
      -c wal_level=logical
      -c max_replication_slots=10
      -c max_wal_senders=10
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 10

  db-migrations:
    build:
      context: ./go
      dockerfile: Dockerfile.migrations
    image: sync-engine-db-migrations:latest
    pull_policy: build
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/syncdb?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c 'migrations migrate && echo "done migrating"'
    volumes:
      - ./go/migrations:/app/migrations

  api:
    build: ./go
    environment:
      SERVICE_MODE: stateless
      DATABASE_URL: postgres://postgres:password@postgres:5432/syncdb?sslmode=disable
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      db-migrations:
        condition: service_completed_successfully

  sse:
    build: ./go
    environment:
      SERVICE_MODE: stateful
      DATABASE_URL: postgres://postgres:password@postgres:5432/syncdb?sslmode=disable
      PORT: "8081"
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      db-migrations:
        condition: service_completed_successfully

volumes:
  pgdata:
