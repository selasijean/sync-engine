name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type check sync-engine
        run: npx tsc --noEmit -p packages/sync-engine/tsconfig.json
      - name: Type check webapp
        run: npx tsc --noEmit -p webapp/tsconfig.json

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint sync-engine
        run: npm run lint --workspace=sync-engine
      - name: Lint webapp
        run: npm run lint --workspace=webapp
